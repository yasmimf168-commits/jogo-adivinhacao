<!DOCTYPE html>
<html lang="pt-br" >
  <head> 
    <meta charset="UTF-8">

    <title> Jogo de Advinhação</title>

    <style>
      .CorpoDaPagina{
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        background-color: rgb(136, 201, 226);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;

      }    
      h1{
        color: cornsilk;
      }
      .container{
          text-align: center;
          background-color: rgb(149, 227, 247);
          padding: 20px;
          border-radius: 10px;
          box-shadow: 0px 0px 10px rebeccapurple
      }

      input[type="number"]{
        padding: 10px;
        font-size: 16px;
        width: 50px;
        margin-bottom: 10px;
    }

    button{padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background-color: antiquewhite;
    color: rgb(0, 0, 0);
    border: none;
    border-radius: 5px;
}

    </style>
  

  </head>


  <body class="CorpoDaPagina">

    <div class="container">

    <h1>&#128523; Jogo de Adivinhaçao &#128523;</h1>
    <p>Tente adivinhar o numero sercreto entre 1 e 100 &#9757;&#65039;&#129299;</p>
 
    <input type="number"id="TXTPalpite" min="1" max="100"/>
    <button id="BTNadivinhar">Adivinhar</button>
    <div class="mensagem" id="DIVMensagem"></div>
